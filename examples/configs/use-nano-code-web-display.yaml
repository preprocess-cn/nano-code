# nano-code 使用 nano-code-web 展示插件的配置示例
#
# 前置条件：
#   运行 `nano-code plugin install @preprocess-cn/nano-code-web` 安装
#   该命令会将展示插件安装到 ~/.nano-code/presentations/nano-code-web.mjs
#   并在全局配置 ~/.nano-code/config.yaml 的 plugins 中注册（默认 disabled）
#
# 激活方式：在项目配置（.nano-code.yaml）或全局配置中设置 display.plugin：

display:
  plugin: nano-code-web

# 说明：
# - 安装时自动加入全局配置 plugins 段，但不会修改 display.plugin
# - display.plugin 只需写展示插件名即可（对应 presentations/ 下的文件名），无需路径
# - 切换回默认 REPL 展示：display.plugin: repl
# - 切换为无展示层（纯 CLI 模式）：display.enabled: false

# 参考：~/.nano-code/config.yaml 中该插件的注册状态：
#
# plugins:
#   nano-code-web:
#     type: display
#     enabled: false
#
# 如果只需要在当前项目中临时使用，也可以在项目级 .nano-code.yaml
# 中直接设置 display.plugin，它会覆盖全局配置。
